<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Description -->
    <meta name="description" content="Mélange Digital - Premium growth agency delivering aggressive, intelligent marketing systems for brands across the GCC and Middle East. We don't just market. We dominate." />
    
    <!-- Preload critical self-hosted fonts -->
    <link rel="preload" href="/fonts/bricolage-grotesque-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/bricolage-grotesque-medium.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/bricolage-grotesque-bold.woff2" as="font" type="font/woff2" crossorigin />
    
    <title>Mélange Digital - Growth Agency</title>
    
    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Mélange Digital",
      "url": "https://melangedigital.co",
      "logo": "https://melangedigital.co/logo.png",
      "description": "Premium growth agency delivering aggressive, intelligent marketing systems for brands across the GCC and Middle East.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "AE",
        "addressRegion": "Dubai"
      },
      "sameAs": [
        "https://twitter.com/melangedigital",
        "https://linkedin.com/company/melangedigital"
      ]
    }
    </script>
    
    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Mélange Digital",
      "url": "https://melangedigital.co",
      "description": "Premium growth agency for the GCC and Middle East"
    }
    </script>
    
    <!-- Structured Data: WebPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Mélange Digital - Growth Agency",
      "url": "https://melangedigital.co",
      "description": "Premium growth agency delivering aggressive, intelligent marketing systems for brands across the GCC and Middle East. We don't just market. We dominate.",
      "inLanguage": "en",
      "isPartOf": {
        "@type": "WebSite",
        "url": "https://melangedigital.co"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
